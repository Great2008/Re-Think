<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Newsletter Admin — Re:Think</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=DM+Mono:wght@0,300;0,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <script>(function(){var t=localStorage.getItem('rt-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    .admin-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }
    .admin-field { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; }
    .admin-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .admin-input, .admin-textarea, .admin-pw {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      box-sizing: border-box;
    }
    .admin-input:focus, .admin-textarea:focus, .admin-pw:focus { border-color: var(--accent); }
    .admin-textarea { resize: vertical; min-height: 240px; line-height: 1.7; }
    .admin-hint {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
    .admin-btn-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .admin-btn {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.7rem 1.4rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .admin-btn:hover:not(:disabled) { background: var(--accent); color: #0d0d0d; }
    .admin-btn.secondary { border-color: var(--border2); color: var(--text-muted); }
    .admin-btn.secondary:hover:not(:disabled) { background: var(--border2); color: var(--text); }
    .admin-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .admin-status {
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      padding: 1rem;
      border: 1px solid var(--border);
      margin-top: 1.5rem;
      line-height: 1.7;
      white-space: pre-wrap;
      display: none;
    }
    .admin-status.visible { display: block; }
    .admin-status.success { border-color: #55b055; color: #55b055; }
    .admin-status.error { border-color: #e05555; color: #e05555; }
    .admin-status.info { border-color: var(--accent); color: var(--accent); }
    .preview-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.5rem;
      margin-top: 1.5rem;
      display: none;
    }
    .preview-box.visible { display: block; }
    .preview-box h3 {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 0.75rem;
    }
    .preview-subject {
      font-family: var(--sans);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .preview-body {
      font-family: var(--sans);
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--text-muted);
      white-space: pre-wrap;
    }
    @media (max-width: 680px) {
      .admin-wrap { padding: 2rem 1.25rem 4rem; }
    }
  </style>
</head>
<body>
  <div id="rt-nav"></div>

  <section class="series-hero">
    <div class="breadcrumb">
      <a href="index.html">Home</a>
      <span class="breadcrumb-sep">/</span>
      <span>Newsletter Admin</span>
    </div>
    <div class="series-hero-label">Admin · Private</div>
    <h1>Send Newsletter</h1>
    <p class="series-hero-desc">Compose and broadcast to all active Re:Think subscribers.</p>
  </section>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-label">Compose</span>
    <div class="divider-line"></div>
  </div>

  <div class="admin-wrap">

    <div class="admin-field">
      <label class="admin-label" for="admin-pw">// Admin password</label>
      <input id="admin-pw" class="admin-pw" type="password" placeholder="Enter admin password" autocomplete="current-password"/>
    </div>

    <div class="admin-field">
      <label class="admin-label" for="admin-subject">// Subject line</label>
      <input id="admin-subject" class="admin-input" type="text"
        placeholder="e.g. Series 004 is live — The Brain Drain Changelog" maxlength="150"/>
    </div>

    <div class="admin-field">
      <label class="admin-label" for="admin-body">// Email body</label>
      <textarea id="admin-body" class="admin-textarea"
        placeholder="Write your email here. Separate paragraphs with a blank line."></textarea>
      <span class="admin-hint">Plain text. Separate paragraphs with a blank line. No HTML needed.</span>
    </div>

    <!-- Preview box -->
    <div class="preview-box" id="previewBox">
      <h3>// Preview</h3>
      <div class="preview-subject" id="previewSubject"></div>
      <div class="preview-body" id="previewBody"></div>
    </div>

    <div class="admin-btn-row">
      <button class="admin-btn secondary" onclick="previewNewsletter()">Preview</button>
      <button class="admin-btn secondary" onclick="checkCount()">Check subscriber count</button>
      <button class="admin-btn" id="sendBtn" onclick="sendNewsletter()">Send to all subscribers</button>
    </div>

    <div class="admin-status" id="adminStatus"></div>

  </div>

  <div id="rt-footer"></div>

  <script src="components.js"></script>
  <script src="script.js"></script>
  <script>
    function getFields() {
      return {
        password: document.getElementById('admin-pw').value.trim(),
        subject: document.getElementById('admin-subject').value.trim(),
        body: document.getElementById('admin-body').value.trim(),
      };
    }

    function showStatus(msg, type) {
      const el = document.getElementById('adminStatus');
      el.textContent = msg;
      el.className = `admin-status visible ${type}`;
    }

    function previewNewsletter() {
      const { subject, body } = getFields();
      if (!subject || !body) { showStatus('Fill in subject and body first.', 'error'); return; }
      document.getElementById('previewSubject').textContent = subject;
      document.getElementById('previewBody').textContent = body;
      document.getElementById('previewBox').classList.add('visible');
      document.getElementById('adminStatus').className = 'admin-status';
    }

    async function checkCount() {
      const { password, subject, body } = getFields();
      if (!password) { showStatus('Enter your admin password first.', 'error'); return; }
      showStatus('Checking...', 'info');
      const res = await fetch('/api/broadcast', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, subject: subject || '(preview)', body: body || '(preview)', preview: true })
      });
      const data = await res.json();
      if (res.status === 401) { showStatus('Wrong password.', 'error'); return; }
      if (res.ok) showStatus(data.message, 'info');
      else showStatus(data.error || 'Error.', 'error');
    }

    async function sendNewsletter() {
      const { password, subject, body } = getFields();
      if (!password || !subject || !body) {
        showStatus('All fields are required.', 'error'); return;
      }

      if (!confirm(`Send "${subject}" to all active subscribers?\n\nThis cannot be undone.`)) return;

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      showStatus('Sending — this may take a minute for large lists...', 'info');

      const res = await fetch('/api/broadcast', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, subject, body })
      });

      const data = await res.json();
      btn.disabled = false;
      btn.textContent = 'Send to all subscribers';

      if (res.status === 401) { showStatus('Wrong password.', 'error'); return; }

      if (res.ok) {
        let msg = `✓ Sent: ${data.sent} of ${data.total}`;
        if (data.failed) msg += `\n✗ Failed: ${data.failed}`;
        if (data.errors) {
          msg += '\n\nFailed addresses:\n' + data.errors.map(e => `${e.email}: ${e.error}`).join('\n');
        }
        showStatus(msg, data.failed ? 'error' : 'success');
      } else {
        showStatus(data.error || 'Something went wrong.', 'error');
      }
    }
  </script>
</body>
</html>
