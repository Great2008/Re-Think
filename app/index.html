<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Re:Think</title>

  <!-- SEO -->
  <meta name="description" content="Re:Think is a blog for people who question the defaults — in systems, in thinking, in the way things have always been done. Raw essays on power, labour, and the world as it actually runs." />
  <meta name="author" content="Re:Think" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://rethink-beta.vercel.app/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Re:Think" />
  <meta property="og:title" content="Re:Think — Question the Defaults" />
  <meta property="og:description" content="Raw essays on power, labour, and the world as it actually runs. A blog for people who question the defaults." />
  <meta property="og:url" content="https://rethink-beta.vercel.app/" />
  <meta property="og:image" content="https://rethink-beta.vercel.app/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Re:Think — Question the Defaults" />
  <meta name="twitter:description" content="Raw essays on power, labour, and the world as it actually runs." />
  <meta name="twitter:image" content="https://rethink-beta.vercel.app/og.png" />

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "Re:Think",
    "description": "A blog for people who question the defaults — in systems, in thinking, in the way things have always been done.",
    "url": "https://rethink-beta.vercel.app/",
    "inLanguage": "en",
    "author": { "@type": "Organization", "name": "Re:Think" }
  }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Theme flash prevention -->
  <script>(function(){var t=localStorage.getItem('rt-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
