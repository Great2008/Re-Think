<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Series — Re:Think</title>
  <meta name="robots" content="index, follow"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <!-- marked.js for markdown rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script>(function(){var t=localStorage.getItem('rt-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>

  <div id="rt-nav"></div>

  <!-- Hero: populated by JS -->
  <section class="series-hero" id="seriesHero" style="display:none">
    <div class="breadcrumb">
      <a href="index.html">Home</a>
      <span class="breadcrumb-sep">/</span>
      <span id="heroBreadcrumb"></span>
    </div>
    <div class="series-hero-label" id="heroLabel"></div>
    <h1 id="heroTitle"></h1>
    <p class="series-hero-desc" id="heroDesc"></p>
  </section>

  <!-- Loading state -->
  <div id="seriesLoading" class="series-loading">
    <span class="series-loading-text">// Loading series...</span>
  </div>

  <!-- Error state -->
  <div id="seriesError" class="series-error" style="display:none">
    <span class="series-loading-text">Series not found.</span>
    <a href="index.html" class="series-error-link">← Back to home</a>
  </div>

  <div class="divider" id="seriesDivider" style="display:none">
    <div class="divider-line"></div>
    <span class="divider-label" id="dividerLabel"></span>
    <div class="divider-line"></div>
  </div>

  <div class="posts" id="posts"></div>

  <div id="rt-comments"></div>
  <div id="rt-footer"></div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)"
    aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closePost()" id="modalCloseBtn" aria-label="Close article">✕ close</button>
      <div class="modal-header">
        <div class="modal-series-label" id="modalPart"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-meta" id="modalMeta"></div>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="share-row">
        <span class="share-label">Share</span>
        <a class="share-btn" id="shareWhatsApp" href="#" target="_blank" rel="noopener noreferrer">WhatsApp</a>
        <a class="share-btn" id="shareX" href="#" target="_blank" rel="noopener noreferrer">𝕏</a>
        <a class="share-btn" id="shareLinkedIn" href="#" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      </div>
      <div class="modal-nav">
        <button class="modal-nav-btn" id="prevBtn" onclick="navigatePost(-1)">← Prev</button>
        <span class="modal-nav-count" id="navCount"></span>
        <button class="modal-nav-btn" id="nextBtn" onclick="navigatePost(1)">Next →</button>
      </div>
    </div>
  </div>

  <script src="components.js"></script>
  <script src="script.js"></script>
  <script>
    const SUPABASE_URL = 'https://dseceshtucrfoxrkqaba.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzZWNlc2h0dWNyZm94cmtxYWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTU2MTMsImV4cCI6MjA5MDA5MTYxM30.-NdLR5iCHizl0XpzoYPK0C6abCeKxPjNJ2Na-NyUgzI';

    const params = new URLSearchParams(window.location.search);
    const seriesId = params.get('id');

    // Configure marked
    marked.setOptions({ breaks: true, gfm: true });

    async function loadSeries() {
      if (!seriesId) { showError(); return; }

      const [seriesRes, postsRes] = await Promise.all([
        fetch(`${SUPABASE_URL}/rest/v1/rethink_series?id=eq.${seriesId}&active=eq.true`, {
          headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
        }),
        fetch(`${SUPABASE_URL}/rest/v1/rethink_posts?series_id=eq.${seriesId}&active=eq.true&order=part_number.asc`, {
          headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
        })
      ]);

      const [seriesData, posts] = await Promise.all([seriesRes.json(), postsRes.json()]);
      const series = seriesData[0];

      if (!series || !posts.length) { showError(); return; }

      // Update page meta
      document.title = `${series.title} — Re:Think`;

      // Populate hero
      document.getElementById('heroBreadcrumb').textContent = `Series ${series.number}`;
      document.getElementById('heroLabel').textContent = `Series ${series.number} · ${posts.length} Parts`;
      document.getElementById('heroTitle').textContent = series.title;
      document.getElementById('heroDesc').textContent = series.description;
      document.getElementById('seriesHero').style.display = '';

      // Divider
      document.getElementById('dividerLabel').textContent = `${posts.length} Parts`;
      document.getElementById('seriesDivider').style.display = '';

      // Hide loading
      document.getElementById('seriesLoading').style.display = 'none';

      // Render post list
      const container = document.getElementById('posts');
      container.innerHTML = posts.map((p, i) => `
        <a class="post-item" onclick="openPostData(${i}); return false;" href="#">
          <div class="post-number">0${p.part_number}</div>
          <div class="post-meta-col">
            <span class="post-subtitle">${p.subtitle}</span>
            <div class="post-title">${p.title}</div>
            <p class="post-excerpt">${p.excerpt}</p>
            <div class="post-footer">
              <span class="post-date">${formatDate(p.published_at)}</span>
              <span class="post-read">${p.read_time}</span>
              <span class="post-tag">${p.tag}</span>
            </div>
          </div>
        </a>
      `).join('');

      // Store posts globally for modal
      window.__posts = posts;
      window.__seriesNumber = series.number;

      // Init comments
      if (typeof injectComments === 'function') injectComments(seriesId);
    }

    function showError() {
      document.getElementById('seriesLoading').style.display = 'none';
      document.getElementById('seriesError').style.display = 'flex';
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    }

    // Override modal to use Supabase data
    function openPostData(index) {
      window.__currentPost = index;
      renderPostModal();
      const overlay = document.getElementById('modalOverlay');
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      overlay.scrollTop = 0;
      document.getElementById('modalCloseBtn').focus();
    }

    function renderPostModal() {
      const posts = window.__posts;
      const i = window.__currentPost;
      const p = posts[i];
      const seriesNum = window.__seriesNumber;
      const url = encodeURIComponent(window.location.href);
      const text = encodeURIComponent(`"${p.title}" — Re:Think`);

      document.getElementById('modalPart').textContent = `Series ${seriesNum} · ${p.subtitle}`;
      document.getElementById('modalTitle').textContent = p.title;
      document.getElementById('modalMeta').innerHTML =
        `<span>${formatDate(p.published_at)}</span><span>${p.read_time}</span>`;

      // Render markdown to HTML
      document.getElementById('modalBody').innerHTML = marked.parse(p.content);

      document.getElementById('navCount').textContent = `${i + 1} of ${posts.length}`;
      document.getElementById('prevBtn').disabled = i === 0;
      document.getElementById('nextBtn').disabled = i === posts.length - 1;

      document.getElementById('shareWhatsApp').href = `https://wa.me/?text=${text}%20${url}`;
      document.getElementById('shareX').href = `https://x.com/intent/tweet?text=${text}&url=${url}`;
      document.getElementById('shareLinkedIn').href = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;

      document.getElementById('modalOverlay').scrollTop = 0;
    }

    // Override navigatePost for dynamic data
    function navigatePost(dir) {
      const posts = window.__posts;
      window.__currentPost = Math.max(0, Math.min(posts.length - 1, window.__currentPost + dir));
      renderPostModal();
      document.getElementById('modalOverlay').scrollTop = 0;
    }

    document.addEventListener('DOMContentLoaded', loadSeries);
  </script>
</body>
</html>
